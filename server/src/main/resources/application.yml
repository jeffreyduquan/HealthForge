spring:
  application:
    name: healthforge-server
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5434/healthforge}
    username: ${DATABASE_USER:healthforge}
    password: ${DATABASE_PASSWORD:changeme-pg-pass}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC
        format_sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:1025}
    username: ${SMTP_USER:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail.smtp.auth: ${SMTP_AUTH:false}
      mail.smtp.starttls.enable: ${SMTP_STARTTLS:false}
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080
  forward-headers-strategy: framework
  compression:
    enabled: true
  error:
    include-message: always
    include-binding-errors: always

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}

healthforge:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-must-be-at-least-512-bit-key-for-HS512-XXXXXXXXXXXXXXXXX}
    access-token-ttl-minutes: 15
    refresh-token-ttl-days: 30
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:changeme-minio-pass}
    public-base-url: ${MINIO_PUBLIC_BASE_URL:http://localhost:9000}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173}
  invite:
    require-invite: true
  audit:
    retention-days: 90

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    root: INFO
    de.healthforge: DEBUG
    org.springframework.security: INFO
