# HealthForge production stack on Netcup VPS.
# Activate after Sprint P1.S8 (Production-Deploy).
# Secrets are loaded from .env (not committed).

services:
  postgres:
    image: postgres:16-alpine
    container_name: healthforge-postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: UTC
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - backend

  minio:
    image: minio/minio:latest
    container_name: healthforge-minio
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - backend

  api:
    image: ghcr.io/jawra/healthforge-server:latest
    container_name: healthforge-api
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      DATABASE_USER: ${POSTGRES_USER}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_PUBLIC_BASE_URL: https://cdn.healthforge.endgear.de
      JWT_SECRET: ${JWT_SECRET}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_AUTH: "true"
      SMTP_STARTTLS: "true"
      CORS_ORIGINS: https://admin.healthforge.endgear.de
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - backend
      - web

  caddy:
    image: caddy:2.8-alpine
    container_name: healthforge-caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./admin-ui-dist:/srv/admin:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
    networks:
      - web

  backup:
    image: postgres:16-alpine
    container_name: healthforge-backup
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
    entrypoint: |
      sh -c '
        echo "0 2 * * * pg_dump -h postgres -U $$POSTGRES_USER $$POSTGRES_DB | gzip > /backups/dump-$$(date +\%Y\%m\%d).sql.gz && find /backups -name dump-*.sql.gz -mtime +30 -delete" > /etc/crontabs/root
        crond -f -L /dev/stdout
      '
    volumes:
      - ./backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend

volumes:
  postgres_data:
  minio_data:
  caddy_data:
  caddy_config:

networks:
  backend:
    driver: bridge
  web:
    driver: bridge
