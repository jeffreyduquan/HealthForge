services:
  postgres:
    image: postgres:16-alpine
    container_name: healthforge-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: healthforge
      POSTGRES_USER: healthforge
      POSTGRES_PASSWORD: changeme-pg-pass
      TZ: UTC
    ports:
      # Dev-Maschine hat ggf. anderen Postgres auf 5432 (marbletrace etc.);
      # 5434 = HealthForge-Dev. Server-application.yml folgt diesem Mapping.
      - "5434:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthforge -d healthforge"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: healthforge-minio-dev
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: changeme-minio-pass
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    volumes:
      - ./data/minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: healthforge-mailhog-dev
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI

  # Server runs locally via `./gradlew bootRun` during dev for fast iteration.
  # Uncomment when you want to test the Docker image:
  # api:
  #   build:
  #     context: ../server
